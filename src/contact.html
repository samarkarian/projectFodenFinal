          <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>

        </button>
      </nav>
    </div>

  <main class="flex-1 pt-16">

    <!-- Hero photo -->
    <section class="contact-hero relative w-full h-[60vh] overflow-hidden">
      <img src="./content/contact.jpg" alt="Contact" class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-black/60"></div>
      <div class="absolute inset-0 flex items-center px-8 sm:px-16 lg:px-24">
        <div class="max-w-xl">
          <h1 class="text-4xl sm:text-5xl lg:text-6xl font-light text-white leading-tight mb-6">Parlons ensemble de votre projet</h1>
          <p class="text-base text-gray-300">Passionné par les histoires et les belles images, je mets ma passion au service de marques pour leur création de contenu.</p>
        </div>
      </div>
    </section>

    <!-- Formulaire centré -->
    <section class="py-16 px-4">
      <div class="max-w-3xl mx-auto 2xl:max-w-screen-2xl">
        <form action="mailto:niangfode@gmail.com" method="post" enctype="text/plain" class="flex flex-col gap-4">
          <label class="block text-sm text-gray-400" for="message">Message</label>
          <textarea id="message" name="Message" required rows="15"
            class="w-full border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-bordeaux transition resize-none 2xl:h-[600px]"
            placeholder="Décrivez votre projet..."></textarea>
          <button type="submit"
            class="w-full bg-bordeaux hover:bg-bordeaux-dark text-white font-semibold py-3 rounded-full transition cursor-pointer">
            Envoyer
          </button>
        </form>
      </div>
    </section>

  </main>

  <!-- Réseaux sociaux -->
    <div class="flex justify-center gap-8 mb-2">
        <a href="https://www.youtube.com/@Songefilms" target="_blank" class="flex items-center gap-2 text-black hover:opacity-70 transition font-medium">
